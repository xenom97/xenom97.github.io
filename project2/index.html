<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#df992f">
    <meta name="description" content="Map Box">
    <link rel="stylesheet" type="text/css" href="css/mystyle.css">
    <title>Map Box</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.3.4/dist/leaflet.css" integrity="sha512-puBpdR0798OZvTTbP4A8Ix/l+A4dHDD0DGqYW6RQ+9jxkRFclaxxQb/SJAWZfWAkuyeQUytO7+7N4QKrDh+drA=="crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.3.4/dist/leaflet.js"integrity="sha512-nMMmRyTVoLYqjP9hrbed9S+FzjZHW5gY1TWCHA5ckwXZBadntCNs8kEqAWdrb9O7rxbCaA4lKTIWjDXZxflOcA==" crossorigin=""></script>
    <link rel="shortcut icon" type="image/png" href="../images/favicon.ico">
</head>
<body>

    <div class="container">
        <header role="banner">
            <a href=".." aria-label="logo back to home" role="link">
                <img class="logo" src="../images/favicon.ico" alt="Logo" role="img">
            </a>
            <div class="caption" aria-label="back to home">
                <a href="..">HOME</a>
            </div>
        </header>

        <div class='map' id='mapid'> </div>
        <div class='image'>
            <img src="images/stadion-gbk.jpg" alt="GBK" role="img">
        </div>
        <div class='review'>
            <p><strong>Gelora Bung Karno Main Stadium</strong></p>
            <p>Gelora Bung Karno Main Stadium is a multi-purpose stadium located at the center of the Gelora Bung Karno Sports Complex in Central Jakarta, Indonesia.</p>
        </div>

        <footer role="contentinfo">
            <a href="..">Ahmad Purnomo &copy; 2018</a>
        </footer>
    </div>

  <script type="application/javascript" src="js/mapbox.js"></script>
  <script type="application/javascript" src="../js/main.js"></script>
</body>
</html>
